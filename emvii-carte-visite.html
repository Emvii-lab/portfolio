<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emvii — Carte de visite</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --violet: #7B2FBE;
    --violet-light: #A855F7;
    --cyan: #00F5FF;
    --magenta: #FF2D78;
    --noir: #06060A;
    --noir2: #0D0B14;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1A1A2E;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 64px;
    padding: 64px 32px;
    font-family: 'Share Tech Mono', monospace;
  }

  .section-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 5px;
    color: #7B2FBE55; text-transform: uppercase;
    text-align: center; margin-bottom: 32px;
  }

  /* ══════════════════════════════
     CARTE HORIZONTALE — 85×54mm
     ratio : 1.574
  ══════════════════════════════ */
  .card-h {
    width: 540px;
    height: 343px;
    position: relative;
    overflow: hidden;
    border-radius: 6px;
  }

  /* ══════════════════════════════
     CARTE VERTICALE — 54×85mm
  ══════════════════════════════ */
  .card-v {
    width: 343px;
    height: 540px;
    position: relative;
    overflow: hidden;
    border-radius: 6px;
  }

  /* Ombre de présentation */
  .card-h, .card-v {
    box-shadow:
      0 0 0 1px #7B2FBE33,
      0 20px 60px #00000088,
      0 0 80px #7B2FBE22;
  }

  /* Print info */
  .print-note {
    font-size: 8px; letter-spacing: 3px;
    color: #7B2FBE33; text-transform: uppercase;
    margin-top: -16px;
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════

══════════════════════════════════════ -->
<div>

      <text x="110" y="252" font-family="'Share Tech Mono'" font-size="6" fill="#FF2D7844" text-anchor="middle">001</text>

      <!-- ── INFOS (droite) ── -->

      <!-- Téléphone -->

      <text x="306" y="212" font-family="'Share Tech Mono'" font-size="9" fill="#e0e0e0" letter-spacing="1">07 82 02 84 08</text>

    </svg>
  </div>
  <div class="print-note" style="text-align:center; margin-top:12px;">85 × 54 mm · format standard</div>
</div>
