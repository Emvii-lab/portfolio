<svg width="280" height="280" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D78"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="gSec" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="gText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00F5FF"/>
      <stop offset="50%"  stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#FF2D78"/>
    </linearGradient>
  </defs>

  <!-- Fond transparent -->

  <!-- Losange principal -->
  <polygon
    points="140,18 258,140 140,262 22,140"
    fill="none"
    stroke="url(#gMain)"
    stroke-width="1.5"/>

  <!-- Carré décalé 45° -->
  <rect
    x="55" y="55" width="170" height="170"
    fill="none"
    stroke="url(#gSec)"
    stroke-width="1"
    opacity="0.5"/>

  <!-- Accents carrés aux 4 sommets du losange -->
  <rect x="136" y="14"  width="8" height="8" fill="#FF2D78"/>
  <rect x="254" y="136" width="8" height="8" fill="#A855F7"/>
  <rect x="136" y="258" width="8" height="8" fill="#FF2D78"/>
  <rect x="18"  y="136" width="8" height="8" fill="#A855F7"/>

  <!-- Triangles aux 4 coins du carré -->
  <polygon points="55,55 67,55 55,67"     fill="#00F5FF" opacity="0.7"/>
  <polygon points="225,55 225,67 213,55"  fill="#00F5FF" opacity="0.7"/>
  <polygon points="55,225 67,225 55,213"  fill="#00F5FF" opacity="0.7"/>
  <polygon points="225,225 213,225 225,213" fill="#00F5FF" opacity="0.7"/>

  <!-- Zone protégée (fond transparent) -->

  <!-- Wordmark EMVII -->
  <text
    x="140" y="148"
    font-family="Orbitron, sans-serif"
    font-weight="900"
    font-size="30"
    fill="url(#gText)"
    text-anchor="middle"
    dominant-baseline="middle">EMVII</text>

</svg>
